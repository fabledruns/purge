name: purge
version: '1.0.0-beta'
main: net.fabledruns.purge.PurgePlugin
api-version: '1.21.11'
load: STARTUP
authors: [ FabledRuns ]
description: The purge plugin for Minecraft Purge events.
softdepend: [WorldGuard]

commands:
  purge:
    description: Purge event admin command
    usage: /purge <start|pause|resume|next|setday|reload|status|save>
    permission: purge.admin
  team:
    description: Team management command
    usage: /team <create|join|leave|lock|unlock|info>
    permission: purge.team

permissions:
  purge.admin:
    description: Allows purge event administration
    default: op
  purge.team:
    description: Allows players to manage their teams
    default: true
